[package]
name = "hello-world-iceberg"
version = "0.1.0"
edition = "2021"

[dependencies]
# Keep existing
iceberg = "0.7.0"
tokio = { version = "1.48.0", features = ["full"] }
anyhow = "1.0.100"
arrow = { version = "55.2.0", features = ["prettyprint"] }
parquet = "55.2.0"
futures = "0.3"

# Add new
reqwest = { version = "0.12", features = ["json"] }
reqsign = { version = "0.18", features = ["aws"] }
reqsign-aws-v4 = "2.0"
reqsign-file-read-tokio = "2.0"
reqsign-http-send-reqwest = "2.0"
http = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"

# Removed: iceberg-catalog-rest = "0.7.0"
